<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ZIBBO // 5-Slide Pitch Deck</title>

  <!-- Typography -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;800;900&family=Space+Grotesk:wght@400;700&family=Fira+Code:wght@400;500;700&display=swap"
    rel="stylesheet">

  <style>
    /* Design Tokens matching Zibbo V0.02 Design Doc */
    :root {
      --bg: #030306;
      --panel-bg: rgba(255, 255, 255, 0.04);
      --panel-border: rgba(255, 255, 255, 0.09);
      --font-main: 'Space Grotesk', -apple-system, sans-serif;
      --font-mono: 'Fira Code', 'JetBrains Mono', monospace;
      --font-header: 'Outfit', sans-serif;

      /* Color Palette */
      --color-primary: #4db09a;
      /* Neon/CRT Phosphor Green */
      --color-accent: #ffb7c5;
      /* Sakura Pink face/accent */
      --color-spark: #00e5ff;
      /* Spark Cyan */
      --color-warn: #ff5a3c;
      /* Warning Red/Orange */
      --color-text-bright: rgba(255, 255, 255, 0.95);
      --color-text-dim: rgba(255, 255, 255, 0.58);
      --color-text-dark: rgba(255, 255, 255, 0.25);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      cursor: crosshair;
    }

    body {
      background-color: var(--bg);
      color: var(--color-text-bright);
      font-family: var(--font-main);
      height: 100vh;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      position: relative;
    }

    /* Background Retro Grids & Overlays */
    .halftone-overlay {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 100;
      background-image: radial-gradient(circle, rgba(255, 255, 255, 0.05) 1.2px, transparent 1.2px);
      background-size: 4px 4px;
      opacity: 0.5;
    }

    .coordinate-grid {
      position: absolute;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(to right, rgba(77, 176, 154, 0.04) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(77, 176, 154, 0.04) 1px, transparent 1px);
      background-size: 50px 50px;
      z-index: 1;
    }

    /* Scanline Animation */
    .scanline {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 4px;
      background: rgba(77, 176, 154, 0.06);
      animation: scanlineSweep 10s linear infinite;
      z-index: 101;
      pointer-events: none;
      box-shadow: 0 0 10px rgba(77, 176, 154, 0.2);
    }

    @keyframes scanlineSweep {
      0% {
        transform: translateY(-100vh);
      }

      100% {
        transform: translateY(100vh);
      }
    }

    /* CRT Monitor Frame & Curved Glass Shader */
    .crt-monitor {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 20px;
      position: relative;
      z-index: 10;
      border-radius: 12px;
      box-shadow: inset 0 0 80px rgba(0, 0, 0, 0.8), 0 0 30px rgba(77, 176, 154, 0.05);
    }

    /* Deck Header & Footer Details */
    .deck-header {
      width: 100%;
      max-width: 1200px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 0 20px 10px 20px;
      border-bottom: 1px solid var(--panel-border);
      font-family: var(--font-mono);
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--color-primary);
      z-index: 20;
    }

    .deck-header .status-tag {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .status-tag .blink-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background-color: var(--color-accent);
      box-shadow: 0 0 8px var(--color-accent);
      animation: blink 1.5s infinite;
    }

    @keyframes blink {

      0%,
      100% {
        opacity: 0.2;
      }

      50% {
        opacity: 1;
      }
    }

    /* Slide Container */
    .slide-wrapper {
      width: 100%;
      max-width: 1200px;
      height: 62vh;
      margin: 15px 0;
      position: relative;
      perspective: 1500px;
      z-index: 10;
    }

    .slide {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      opacity: 0;
      pointer-events: none;
      transform: rotateX(15deg) translateZ(-100px) scale(0.92);
      transition: all 0.7s cubic-bezier(0.19, 1, 0.22, 1);
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
      align-items: center;
    }

    .slide.active {
      opacity: 1;
      pointer-events: auto;
      transform: rotateX(0deg) translateZ(0) scale(1);
    }

    /* Helper styles for single center layout slides */
    .slide.full-layout {
      grid-template-columns: 1fr;
    }

    /* Retro Tech Panels / Boxes */
    .tilt-panel {
      background: var(--panel-bg);
      border: 1px solid var(--panel-border);
      border-radius: 8px;
      padding: 24px;
      position: relative;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      transition: border-color 0.3s, box-shadow 0.3s;
      overflow: hidden;
    }

    .tilt-panel:hover {
      border-color: rgba(77, 176, 154, 0.4);
      box-shadow: 0 0 15px rgba(77, 176, 154, 0.1);
    }

    /* Corner Bracket Accents */
    .p-corner {
      position: absolute;
      width: 10px;
      height: 10px;
      border: 1px solid var(--color-primary);
      opacity: 0.6;
    }

    .p-tl {
      top: -1px;
      left: -1px;
      border-bottom: none;
      border-right: none;
    }

    .p-tr {
      top: -1px;
      right: -1px;
      border-bottom: none;
      border-left: none;
    }

    .p-bl {
      bottom: -1px;
      left: -1px;
      border-top: none;
      border-right: none;
    }

    .p-br {
      bottom: -1px;
      right: -1px;
      border-top: none;
      border-left: none;
    }

    /* Typography inside slides */
    h2.slide-title {
      font-family: var(--font-header);
      font-size: 42px;
      font-weight: 900;
      letter-spacing: -1.5px;
      line-height: 1.1;
      margin-bottom: 12px;
      color: var(--color-text-bright);
    }

    h2.slide-title span.highlight {
      color: var(--color-accent);
      text-shadow: 0 0 15px rgba(255, 183, 197, 0.3);
    }

    h2.slide-title span.phosphor {
      color: var(--color-primary);
      text-shadow: 0 0 15px rgba(77, 176, 154, 0.3);
    }

    .slide-subtitle {
      font-size: 18px;
      color: var(--color-text-dim);
      margin-bottom: 24px;
      line-height: 1.4;
    }

    /* Bullet List items with retro styling */
    .bullet-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .bullet-item {
      display: flex;
      gap: 12px;
      align-items: flex-start;
    }

    .bullet-item .icon {
      font-family: var(--font-mono);
      color: var(--color-accent);
      font-weight: 700;
      margin-top: 2px;
    }

    .bullet-item h3 {
      font-size: 15px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 4px;
      color: var(--color-text-bright);
    }

    .bullet-item p {
      font-size: 13px;
      color: var(--color-text-dim);
      line-height: 1.5;
    }

    /* Deck Footer & Control Bar */
    .deck-footer {
      width: 100%;
      max-width: 1200px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 20px 0 20px;
      border-top: 1px solid var(--panel-border);
      font-family: var(--font-mono);
      font-size: 10px;
      color: var(--color-text-dark);
      z-index: 20;
    }

    .nav-controls {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .nav-btn {
      background: var(--panel-bg);
      border: 1px solid var(--panel-border);
      color: var(--color-text-bright);
      padding: 6px 12px;
      border-radius: 4px;
      font-family: var(--font-mono);
      font-size: 10px;
      transition: all 0.2s;
    }

    .nav-btn:hover {
      border-color: var(--color-primary);
      color: var(--color-primary);
      box-shadow: 0 0 8px rgba(77, 176, 154, 0.2);
    }

    .nav-btn:active {
      transform: scale(0.95);
    }

    .slide-dots {
      display: flex;
      gap: 6px;
    }

    .dot {
      width: 6px;
      height: 6px;
      background-color: var(--color-text-dark);
      border-radius: 50%;
      transition: all 0.3s;
    }

    .dot.active {
      background-color: var(--color-primary);
      box-shadow: 0 0 6px var(--color-primary);
      transform: scale(1.3);
    }

    /* Slide specific styling & interactions */

    /* Slide 1 - Cover */
    .robot-showcase {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100%;
      position: relative;
    }

    .robot-iframe-wrap {
      width: 100%;
      height: 90%;
      border: 1.5px solid var(--panel-border);
      border-radius: 8px;
      overflow: hidden;
      background: rgba(0, 0, 0, 0.3);
      position: relative;
      transition: border-color 0.3s;
    }

    .robot-iframe-wrap:hover {
      border-color: var(--color-primary);
      box-shadow: 0 0 20px rgba(77, 176, 154, 0.15);
    }

    .robot-iframe-wrap iframe {
      width: 100%;
      height: 100%;
      border: none;
      pointer-events: auto;
    });

  </script>
</body>

</html>
